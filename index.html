<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GONDRONG PANEL</title>
<style>
body {
  margin: 0; padding: 0; height: 100vh;
  background: url('https://i.ibb.co/3YdS3zL/contoh-bg.jpg') no-repeat center center fixed;
  background-size: cover;
  font-family: sans-serif; overflow: hidden;
}
.watermark {
  position: absolute; top: 20px; width: 100%;
  text-align: center; color: #00BFFF; font-weight: bold; font-size: 16px;
  text-shadow: 1px 1px 2px black;
}
.panel {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%); width: 80%;
  background: rgba(0,0,0,0.75); padding: 20px; border-radius: 20px;
}
.item { color: white; margin: 18px 0; display: flex; align-items: center; justify-content: space-between; font-weight: bold; }
.switch { position: relative; width: 55px; height: 28px; }
.switch input { display:none; }
.slider {
  position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
  background-color: #555; transition: .3s; border-radius: 28px;
}
.slider:before {
  position: absolute; content: ""; height: 22px; width: 22px; left: 3px; bottom: 3px;
  background-color: white; transition: .3s; border-radius: 50%;
}
input:checked + .slider { background-color: #00BFFF; }
input:checked + .slider:before { transform: translateX(27px); }
.btn {
  width: 100%; padding: 15px; background: black; color: white;
  border: none; border-radius: 15px; font-size: 18px; font-weight: bold; margin-top: 10px;
}
</style>
</head>
<body>
<div class="watermark">by.ADITT ANDI</div>
<div class="panel">
  <div class="item">PALA 70% 
    <label class="switch"><input type="checkbox"><span class="slider"></span></label>
  </div>
  <div class="item">MODE BUTA 
    <label class="switch"><input type="checkbox" onclick="alert('Fitur ini butuh app native ya bang')"><span class="slider"></span></label>
  </div>
  <div class="item">FIX LAG 
    <label class="switch"><input type="checkbox" onclick="alert('Fitur ini butuh app native ya bang')"><span class="slider"></span></label>
  </div>
  <div class="item">XXX 
    <label class="switch"><input type="checkbox"><span class="slider"></span></label>
  </div>
  <button class="btn" onclick="window.location.href='intent://com.dts.freefireth#Intent;scheme=package;end'">OPEN EPEP</button>
</div>
</body>
</html>
